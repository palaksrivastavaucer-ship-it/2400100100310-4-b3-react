<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#141414;
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(0,0,0,0.7);
  position:fixed;
  width:100%;
}

.logo{
  color:#e50914;
  font-size:28px;
  font-weight:bold;
}

nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
}

.hero{
  height:70vh;
  background:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:60px;
}

.hero h1{
  font-size:50px;
  margin-bottom:10px;
}

.hero button{
  padding:10px 20px;
  margin-right:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.play{
  background:white;
}

.info{
  background:rgba(109,109,110,0.7);
  color:white;
}

.row{
  padding:20px 40px;
}

.row h2{
  margin-bottom:10px;
}

.movies{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.movie{
  min-width:200px;
  height:120px;
  background:#333;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

footer{
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <div class="logo">NETFLIX</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">TV Shows</a>
    <a href="#">Movies</a>
    <a href="#">My List</a>
  </nav>
</header>

<section class="hero">
  <h1>Featured Movie</h1>
  <p>Watch the latest trending movies and series.</p>
  <div>
    <button class="play">Play</button>
    <button class="info">More Info</button>
  </div>
</section>

<section class="row">
  <h2>Trending Now</h2>
  <div class="movies">
    <div class="movie">Movie 1</div>
    <div class="movie">Movie 2</div>
    <div class="movie">Movie 3</div>
    <div class="movie">Movie 4</div>
    <div class="movie">Movie 5</div>
  </div>
</section>

<section class="row">
  <h2>Popular on Netflix</h2>
  <div class="movies">
    <div class="movie">Show 1</div>
    <div class="movie">Show 2</div>
    <div class="movie">Show 3</div>
    <div class="movie">Show 4</div>
    <div class="movie">Show 5</div>
  </div>
</section>

<footer>
  Netflix Clone Demo
</footer>

</body>
</html>
